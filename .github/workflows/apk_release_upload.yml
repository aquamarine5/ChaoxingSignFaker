name: Android Build For Me

on:
  workflow_dispatch: # 允许你在 Actions 页面手动点击按钮运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 核心修改：改为 assembleDebug，并注入 GitHub 自带的 Token 解决插件下载报错
      - name: Build apk file with Gradle
        run: ./gradlew assembleDebug
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          # 原作者的 gradle 可能在读取 GHP_TOKEN，我们把系统自带的塞给它
          GHP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UMENG_CHANNEL: GithubRelease

      # 核心修改：把上传到 Release 改为生成供你直接下载的压缩包
      - name: Upload apk file
        uses: actions/upload-artifact@v4
        with:
          name: Chaoxing-App-Debug
          path: app/build/outputs/apk/debug/*.apk
